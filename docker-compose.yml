name: brewrelay

services:
  postgres:
    image: postgres:16-alpine
    container_name: brewrelay-postgres
    environment:
      POSTGRES_USER: brewrelay
      POSTGRES_PASSWORD: brewrelay
      POSTGRES_DB: brewrelay
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brewrelay -d brewrelay"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: brewrelay-kafka
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: "kafka"
    volumes:
      - ./docker/jmx/jmx-kafka.yml:/etc/kafka/jmx-kafka.yml:ro
    user: "0"
    command:
      - "bash"
      - "-c"
      - |
        curl -sL -o /tmp/jmx_prometheus_javaagent.jar https://github.com/prometheus/jmx_exporter/releases/download/v1.6.0/jmx_prometheus_javaagent-1.6.0.jar && \
        export KAFKA_OPTS="-javaagent:/tmp/jmx_prometheus_javaagent.jar=7071:/etc/kafka/jmx-kafka.yml" && \
        /etc/confluent/docker/run
    healthcheck:
      test: ["CMD-SHELL", "unset JMX_PORT; kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-connect:
    image: debezium/connect:2.7.3.Final
    container_name: brewrelay-kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: "kafka:29092"
      GROUP_ID: "brewrelay-connect"
      CONFIG_STORAGE_TOPIC: "brewrelay-connect-configs"
      OFFSET_STORAGE_TOPIC: "brewrelay-connect-offsets"
      STATUS_STORAGE_TOPIC: "brewrelay-connect-status"
      KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: "kafka-connect"
    volumes:
      - ./docker/jmx/jmx-connect.yml:/etc/kafka-connect/jmx-connect.yml:ro
      - ./docker/debezium/connector.json:/connector.json:ro
    user: "0"
    command:
      - "bash"
      - "-c"
      - |
        curl -sL -o /tmp/jmx_prometheus_javaagent.jar https://github.com/prometheus/jmx_exporter/releases/download/v1.6.0/jmx_prometheus_javaagent-1.6.0.jar && \
        export KAFKA_OPTS="-javaagent:/tmp/jmx_prometheus_javaagent.jar=7072:/etc/kafka-connect/jmx-connect.yml" && \
        /docker-entrypoint.sh start &
        CONNECT_PID=$$!
        echo ">> Esperando a Kafka Connect ..."
        for i in $$(seq 1 30); do
          if curl -sf http://localhost:8083/ >/dev/null 2>&1; then
            echo "   Kafka Connect disponible."
            break
          fi
          sleep 3
        done
        echo ">> Registrando conector Debezium ..."
        if curl -sf http://localhost:8083/connectors/brewrelay-outbox-connector >/dev/null 2>&1; then
          curl -sf -X DELETE http://localhost:8083/connectors/brewrelay-outbox-connector >/dev/null
        fi
        curl -sf -X POST -H "Content-Type: application/json" --data @/connector.json http://localhost:8083/connectors && echo ""
        echo "✅ Conector registrado."
        wait $$CONNECT_PID
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: brewrelay-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: brewrelay
      PGPASSWORD: brewrelay
      PGDATABASE: brewrelay
      PGSSLMODE: disable
      HTTP_ADDR: ":8080"
      CORS_ORIGIN: "*"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: brewrelay-worker
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: brewrelay
      PGPASSWORD: brewrelay
      PGDATABASE: brewrelay
      PGSSLMODE: disable
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_TOPIC: "coffee.orders"
      KAFKA_GROUP: "barista-worker"
      METRICS_ADDR: ":8081"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8080"
    container_name: brewrelay-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

  # ===== Observabilidad (2 contenedores) =====

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: brewrelay-prometheus
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: brewrelay-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      PG_HOST: postgres
      PG_USER: brewrelay
      PG_PASSWORD: brewrelay
      PG_DB: brewrelay
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  pgdata:
  prometheus-data:
  grafana-data: