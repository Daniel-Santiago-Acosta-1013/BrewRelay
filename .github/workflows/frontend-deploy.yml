name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - apps/frontend/**
      - package.json
      - bun.lock
      - infra/blueprints/modules/frontend/**
      - infra/terraform/live/dev/services/frontend/**
      - .github/workflows/frontend-deploy.yml
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: brewrelay
  ENVIRONMENT: dev
  TF_VERSION: 1.5.7
  TG_VERSION: 0.98.0

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun --filter @brewrelay/frontend build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          curl -sL -o /tmp/tg https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64
          chmod +x /tmp/tg
          sudo mv /tmp/tg /usr/local/bin/terragrunt

      - name: Bootstrap Terraform state
        run: .github/scripts/bootstrap-terraform-state.sh

      - name: Initialize dependency stacks
        run: |
          cd infra/terraform
          for stack in live/dev/shared/vpc live/dev/services/ecs; do
            terragrunt init --terragrunt-working-dir "${stack}" || true
          done

      - name: Apply frontend infra
        run: |
          cd infra/terraform
          terragrunt apply -auto-approve --terragrunt-working-dir live/dev/services/frontend

      - name: Sync to S3
        run: |
          BUCKET="${PROJECT_NAME}-${ENVIRONMENT}-frontend"
          aws s3 sync apps/frontend/dist "s3://${BUCKET}" --delete --exclude "runtime-config.json"

      - name: Invalidate CloudFront
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(DisplayName, '${PROJECT_NAME}')].Id" \
            --output text | head -1)
          if [[ -n "${DIST_ID}" ]]; then
            aws cloudfront create-invalidation --distribution-id "${DIST_ID}" --paths "/*"
          fi