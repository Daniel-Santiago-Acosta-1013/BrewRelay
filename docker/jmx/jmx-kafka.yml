lowercaseOutputName: true
lowercaseOutputLabelNames: true
rules:
  # Broker metrics
  - pattern: 'kafka.server<type=(.+), name=(.+)><>Value'
    name: kafka_server_$1_$2
    type: GAUGE
  - pattern: 'kafka.server<type=(.+), name=(.+), topic=(.+)><>Value'
    name: kafka_server_$1_$2
    labels:
      topic: $3
    type: GAUGE
  # Topic partition metrics
  - pattern: 'kafka.cluster<type=Partition, name=(.+), topic=(.+), partition=(.+)><>Value'
    name: kafka_cluster_partition_$1
    labels:
      topic: $2
      partition: $3
    type: GAUGE
  # Consumer group metrics
  - pattern: 'kafka.coordinator<type=GroupMetadataManager, name=(.+)><>Value'
    name: kafka_coordinator_$1
    type: GAUGE
  # Network metrics
  - pattern: 'kafka.network<type=(.+), name=(.+)><>Value'
    name: kafka_network_$1_$2
    type: GAUGE
  # General catch-all for numeric values
  - pattern: 'kafka<type=(.+), name=(.+), (.+)=(.+), (.+)=(.+)><>Value'
    name: kafka_$1_$2
    labels:
      $3: $4
      $5: $6
    type: GAUGE