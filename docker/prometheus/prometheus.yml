global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: kafka
    static_configs:
      - targets: ['kafka:7071']

  - job_name: kafka-connect
    static_configs:
      - targets: ['kafka-connect:7072']

  - job_name: brewrelay-api
    static_configs:
      - targets: ['api:8080']

  - job_name: brewrelay-worker
    static_configs:
      - targets: ['worker:8081']