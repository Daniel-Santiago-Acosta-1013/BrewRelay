global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Prometheus self
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # PostgreSQL metrics
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  # BrewRelay API (pedidos, notificaciones, estado)
  - job_name: brewrelay-api
    static_configs:
      - targets: ['api:8080']